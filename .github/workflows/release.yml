name: Release (Windows)

on:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore MAUI workloads
        run: dotnet workload restore

      - name: Extract version from tag
        id: version
        run: |
          $version = "${{ github.event.release.tag_name }}".TrimStart('v')
          Add-Content $env:GITHUB_OUTPUT "VERSION=$version"

      - name: Publish Windows app
        run: >
          dotnet publish src/Cockpit/Cockpit.csproj
          --framework net10.0-windows10.0.19041.0
          --configuration Release
          -p:ApplicationDisplayVersion=${{ steps.version.outputs.VERSION }}
          -p:ApplicationVersion=${{ github.run_number }}
          -p:Version=${{ steps.version.outputs.VERSION }}
          --output ./publish/windows

      - name: Zip publish output
        run: Compress-Archive -Path ./publish/windows/* -DestinationPath ./Cockpit-windows-x64-${{ steps.version.outputs.VERSION }}.zip

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer (NSIS)
        run: |
          $sourcePath = "${{ github.workspace }}\publish\windows"
          $version    = "${{ steps.version.outputs.VERSION }}"
          $outputPath = "${{ github.workspace }}\Cockpit-windows-x64-${{ steps.version.outputs.VERSION }}-Setup.exe"
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DAPP_VERSION="$version" /DSOURCE_PATH="$sourcePath" /DOUTPUT_PATH="$outputPath" .github/installers/windows.nsi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Cockpit-windows-x64-${{ steps.version.outputs.VERSION }}.zip
            Cockpit-windows-x64-${{ steps.version.outputs.VERSION }}-Setup.exe
          generate_release_notes: false

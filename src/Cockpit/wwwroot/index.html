<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Cockpit</title>
    <base href="/" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="_content/Blazor.Sonner/styles.css" />
    <link rel="stylesheet" href="_content/XtermBlazor/XtermBlazor.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="Cockpit.styles.css" />
</head>

<body class="bg-vscode-bg text-vscode-text overflow-hidden border-t border-vscode-border">

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.min.js"></script>
    <script src="_content/XtermBlazor/XtermBlazor.min.js"></script>
    <script src="js/interop.js"></script>
    <script src="js/xtermInterop.js"></script>
    <script>
        // Initialize highlight.js when ready
        if (window.hljs) {
            hljs.configure({
                ignoreUnescapedHTML: true,
                languages: ['csharp', 'javascript', 'typescript', 'python', 'java', 'json', 'xml', 'bash', 'sql', 'css', 'html']
            });
        }

        // Register XtermBlazor addons
        if (window.XtermBlazor) {
            XtermBlazor.registerAddons({ "addon-fit": new FitAddon.FitAddon() });
        }
    </script>

</body>

</html>
